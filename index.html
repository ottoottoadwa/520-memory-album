<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520❤子元和苏珊的回忆相册</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'ZCOOL QingKe HuangYou', 'ZCOOL KuaiLe', sans-serif;
            background: linear-gradient(180deg, #fff0f3 0%, #ffe4e9 30%, #ffd6e0 60%, #ffc8d6 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #5a2d3e;
        }

        /* ========== 全局动画 ========== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ========== 飘落爱心背景 ========== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            font-size: 18px;
            animation: fall linear infinite;
            opacity: 0.6;
        }

        /* ========== 页面容器 ========== */
        .page-container {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* ========== 封面页 ========== */
        .cover-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
            position: relative;
        }

        .cover-badge {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
            animation: fadeInUp 0.8s ease forwards;
        }

        .cover-title {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 72px;
            background: linear-gradient(135deg, #ff6b9d, #d63384, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, fadeInUp 1s ease forwards 0.3s;
            opacity: 0;
            text-shadow: none;
            margin-bottom: 10px;
        }

        .cover-subtitle {
            font-size: 20px;
            color: #c2185b;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease forwards 0.6s;
            opacity: 0;
            font-weight: 600;
        }

        .cover-heart {
            font-size: 80px;
            animation: heartbeat 1.5s ease-in-out infinite, fadeIn 1.5s ease forwards 0.9s;
            opacity: 0;
            filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.5));
            margin: 15px 0;
        }

        .cover-names {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 28px;
            color: #d63384;
            margin: 20px 0;
            animation: fadeInUp 1s ease forwards 1.2s;
            opacity: 0;
        }

        .cover-names span {
            display: inline-block;
            margin: 0 10px;
        }

        .cover-names .and {
            font-size: 20px;
            color: #ff6b9d;
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            animation: float 2s ease-in-out infinite, fadeIn 2s ease forwards 2s;
            opacity: 0;
            color: #d63384;
            font-size: 14px;
        }

        .scroll-hint::after {
            content: '↓';
            display: block;
            font-size: 24px;
            margin-top: 5px;
        }

        /* ========== 通用卡片样式 ========== */
        .section-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            margin: 15px 15px;
            padding: 25px 20px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .section-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 26px;
            color: #d63384;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b9d, transparent);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* ========== 纪念日倒计时 ========== */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .countdown-item {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            border-radius: 16px;
            padding: 12px 5px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.2);
        }

        .countdown-number {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'ZCOOL QingKe HuangYou', 'ZCOOL KuaiLe', sans-serif;
        }

        .countdown-label {
            font-size: 12px;
            color: #fff;
            margin-top: 4px;
            opacity: 0.9;
        }

        .countdown-text {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
            color: #8b1c4a;
            line-height: 1.6;
        }

        /* ========== 回忆时间线 ========== */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #ff9a9e, #fecfef, #ff9a9e);
            border-radius: 3px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-left: 20px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.5s ease;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .timeline-dot {
            position: absolute;
            left: -26px;
            top: 5px;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 10px rgba(255, 107, 157, 0.4);
        }

        .timeline-date {
            font-size: 13px;
            color: #ff6b9d;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-content {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 12px 15px;
            font-size: 14px;
            color: #5a2d3e;
            line-height: 1.7;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .timeline-photo {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-top: 10px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: linear-gradient(135deg, #ffd6e0, #ffe4e9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }

        .timeline-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========== 照片墙 ========== */
        .photo-wall {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .photo-item {
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd6e0, #ffe4e9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-item:nth-child(3) {
            grid-column: span 2;
            aspect-ratio: 2/1;
        }

        .photo-item:hover {
            transform: scale(1.03);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            font-size: 50px;
            opacity: 0.6;
        }

        .photo-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            color: white;
            padding: 20px 10px 10px;
            font-size: 13px;
            text-align: center;
        }

        /* ========== 情书区域 ========== */
        .love-letter-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,240,243,0.8));
        }

        .letter-content {
            font-size: 15px;
            line-height: 2;
            color: #5a2d3e;
            text-align: justify;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            border: 1px dashed rgba(255, 107, 157, 0.3);
        }

        .letter-signature {
            text-align: right;
            margin-top: 15px;
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 22px;
            color: #d63384;
        }

        /* ========== 互动按钮 ========== */
        .interactive-section {
            text-align: center;
            padding: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .romantic-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-family: 'ZCOOL QingKe HuangYou', 'ZCOOL KuaiLe', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            color: white;
            box-shadow: 0 4px 20px rgba(161, 140, 209, 0.4);
        }

        .btn-secondary:active {
            transform: scale(0.95);
        }

        /* ========== 弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            position: relative;
            overflow: hidden;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,107,157,0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .modal-emoji {
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
            animation: pulse 1s ease-in-out infinite;
        }

        .modal-title {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', cursive;
            font-size: 28px;
            color: #d63384;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .modal-text {
            font-size: 15px;
            color: #5a2d3e;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .modal-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            border: none;
            border-radius: 25px;
            font-family: 'ZCOOL QingKe HuangYou', 'ZCOOL KuaiLe', sans-serif;
            font-size: 15px;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        /* ========== 烟花效果 ========== */
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .firework-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ========== 漂浮爱心 ========== */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 500;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.3); opacity: 0; }
        }

        /* ========== 底部 ========== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #c2185b;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .footer.visible {
            opacity: 1;
        }

        .footer-heart {
            font-size: 30px;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
            margin: 10px 0;
        }

        /* ========== 照片查看器 ========== */
        .photo-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .photo-viewer.active {
            opacity: 1;
            pointer-events: all;
        }

        .photo-viewer img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .photo-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        /* ========== 音乐按钮 ========== */
        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 107, 157, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            color: #d63384;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.2);
        }

        .music-toggle.playing {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== 星星装饰 ========== */
        .star-decor {
            position: fixed;
            color: #ffd700;
            font-size: 14px;
            animation: twinkle 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <!-- 飘落爱心背景 -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- 星星装饰 -->
    <div id="starsDecor"></div>

    <!-- 烟花容器 -->
    <div class="fireworks-container" id="fireworks"></div>

    <!-- 音乐按钮 -->
    <div class="music-toggle" id="musicBtn" onclick="toggleMusic()">🎵</div>

    <!-- 照片查看器 -->
    <div class="photo-viewer" id="photoViewer" onclick="closePhotoViewer()">
        <div class="photo-viewer-close">✕</div>
        <img id="viewerImg" src="" alt="照片">
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-emoji" id="modalEmoji">💕</span>
            <h3 class="modal-title" id="modalTitle">标题</h3>
            <p class="modal-text" id="modalText">内容</p>
            <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <!-- 页面内容 -->
    <div class="page-container">

        <!-- ========== 封面 ========== -->
        <section class="cover-page">
            <div class="cover-badge">❤️ 520 特别礼物 ❤️</div>
            <div class="cover-title">520</div>
            <div class="cover-subtitle">我们的专属回忆相册</div>
            <div class="cover-heart">❤️</div>
            <div class="cover-names">
                <span>黄子元</span>
                <span class="and">&</span>
                <span>苏珊</span>
            </div>
            <div class="scroll-hint">向下滑动开启回忆</div>
        </section>

        <!-- ========== 纪念日倒计时 ========== -->
        <div class="section-card" id="countdownCard">
            <h2 class="section-title">⏰ 我们在一起已经</h2>
            <div class="countdown-grid">
                <div class="countdown-item">
                    <div class="countdown-number" id="days">0</div>
                    <div class="countdown-label">天</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="hours">0</div>
                    <div class="countdown-label">时</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="minutes">0</div>
                    <div class="countdown-label">分</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="seconds">0</div>
                    <div class="countdown-label">秒</div>
                </div>
            </div>
            <div class="countdown-text">
                从 <strong id="startDate">2024年1月1日</strong> 开始<br>
                每一个瞬间都值得珍藏 💕
            </div>
        </div>

        <!-- ========== 回忆时间线 ========== -->
        <div class="section-card" id="timelineCard">
            <h2 class="section-title">📖 我们的故事</h2>
            <div class="timeline" id="timeline">
                <!-- 时间线项目由JS生成 -->
            </div>
        </div>

        <!-- ========== 照片墙 ========== -->
        <div class="section-card" id="photoWallCard">
            <h2 class="section-title">📸 甜蜜瞬间</h2>
            <div class="photo-wall" id="photoWall">
                <!-- 照片由JS生成 -->
            </div>
            <p style="text-align:center; margin-top:15px; font-size:13px; color:#999;">
                💡 点击照片可以放大查看哦
            </p>
        </div>

        <!-- ========== 情书 ========== -->
        <div class="section-card love-letter-card" id="letterCard">
            <h2 class="section-title">💌 写给你的情书</h2>
            <div class="letter-content" id="letterContent">
                <!-- 情书内容由JS打字机效果生成 -->
            </div>
            <div class="letter-signature">
                永远爱苏珊的 ❤️ <span id="senderName">黄子元</span>
            </div>
        </div>

        <!-- ========== 互动区域 ========== -->
        <div class="section-card interactive-section" id="interactiveCard">
            <h2 class="section-title">🎁 专属互动</h2>
            <p style="font-size:14px; color:#8b1c4a; margin-bottom:10px;">
                点击按钮，接收我的爱意 💕
            </p>
            <div class="btn-group">
                <button class="romantic-btn btn-primary" onclick="showLoveModal()">
                    💕 宝宝想对你说
                </button>

    </div>

    <script>
        // ═══════════════════════════════════════
        // 🎀 配置区域 - 修改这里的内容！
        // ═══════════════════════════════════════

        const CONFIG = {
            // 你们的名字
            yourName: '黄子元',
            herName: '苏珊',

            // 恋爱开始日期（格式：年, 月-1, 日）

            startDate: new Date(2025, 4, 31),

            // 时间线回忆（按时间顺序添加）
            memories: [
                {
                    date: '2025年5月31日',
                    title: '初次相遇',

                {

                    emoji: '💑',
                    photo: 'images/3.png'
                },
                {
                    date: '2025年11月29日',
                    title: '最特别的生日',
                    text: '你提前给我过了人生中最特别的生日，这是我第一次过这么丰富的生日，我感觉我好幸福能拥有这么体贴温柔可爱又爱我的女孩，我好幸运，我爱你，我们一辈子不分开。',

                    photo: 'images/4.png'
                },
                {

                    emoji: '💞',
                    photo: 'images/5.png'
                }
            ],

            // 照片墙（最多放6张，第3张会自动跨两列）
            photos: [
                { caption: '我们的合照', emoji: '💑', url: 'images/6.jpg' },
                { caption: '甜蜜约会', emoji: '🥰', url: 'images/7.jpg' },
                { caption: '美好时光', emoji: '📸', url: 'images/8.jpg' },
                { caption: '幸福瞬间', emoji: '✨', url: 'images/9.jpg' },
                { caption: '永远爱你', emoji: '❤️' }
            ],

            // 情书内容
            loveLetter: `老婆小屁股猪：

    宝宝写这封信的时候，心里全都是温柔的爱意。

    遇见老婆之前，我从未想过一个人可以如此深刻地改变另一个人的生活。老婆你的出现，像一道光，照亮了宝宝原本平淡无奇的世界。

    宝宝喜欢听你叫宝宝，喜欢听你说话的可爱萌萌声音，喜欢牵着你的手散步，喜欢和你分享生活中的每一件小事。有老婆你在身边，平凡的日子也变得闪闪发光。

    这一年来，我们一起经历了很多：有欢笑，有感动，也有大大小小的争吵。但每一次，我们都更加了解彼此，更加珍惜对方，生活里充满了满满的可爱萌意爱意。

    520只是一个数字，但"宝宝超级爱老婆"是每一天的心情。宝宝想陪你走过更多的春夏秋冬，看更多的日出日落，创造更多属于我们的回忆。

    谢谢你选择了我，我成为了老婆唯一的宝宝，谢谢你一直在宝宝身边。未来的路还很长，我想和你一起慢慢走。

    爱你，不止今天。`,

            // 弹窗内容
            popups: {
                love: {
                    emoji: '💕',
                    title: '宝宝的心里话',
                    text: '老婆小猪，宝宝爱你，你的笑容是宝宝每天的动力，你的温柔是宝宝最大的幸福。宝宝想用余生来守护老婆、疼爱老婆。谢谢你出现在宝宝的生命里，让宝宝成为了最好的自己。'
                },
                hug: {
                    emoji: '🤗',
                    title: '一个大大的拥抱',
                    text: '虽然宝宝不能一直抱着你，但宝宝的心已经飞到老婆身边啦。希望这个心心的拥抱能给老婆带来温暖，等宝宝见到老婆猪妞，一定要给可爱萌萌鬼老婆一个大大的、紧紧的拥抱！'
                },
                promise: {
                    emoji: '💍',
                    title: '宝宝对你的承诺',
                    text: '宝宝只会越来越爱老婆，一天更比一天更爱老婆，更喜欢你，无论未来怎样，宝宝都会牵着你的手，一起走下去，我们要克服一切困难，一切的矛盾，我们要在一起十辈子。'
                }
            }
        };

        // ═══════════════════════════════════════
        // 初始化
        // ═══════════════════════════════════════

        function init() {
            createFallingHearts();
            createStars();
            updateNames();
            updateCountdown();
            setInterval(updateCountdown, 1000);
            renderTimeline();
            renderPhotoWall();
            typeLetter();
            setupScrollAnimation();
            setupClickHearts();
        }

        // 更新名字
        function updateNames() {
            document.querySelector('.cover-names').innerHTML = `
                <span>${CONFIG.yourName}</span>
                <span class="and">&</span>
                <span>${CONFIG.herName}</span>
            `;
            document.getElementById('senderName').textContent = CONFIG.yourName;
            document.getElementById('startDate').textContent = 
                CONFIG.startDate.getFullYear() + '年' + 
                (CONFIG.startDate.getMonth() + 1) + '月' + 
                CONFIG.startDate.getDate() + '日';
        }

        // 飘落爱心
        function createFallingHearts() {
            const container = document.getElementById('heartsBg');
            const symbols = ['❤️', '💖', '💕', '💗', '💓', '💝', '🌸'];
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (Math.random() * 14 + 12) + 'px';
                container.appendChild(heart);
            }
        }

        // 星星装饰
        function createStars() {
            const container = document.getElementById('starsDecor');
            for (let i = 0; i < 15; i++) {
                const star = document.createElement('div');
                star.className = 'star-decor';
                star.innerHTML = '✨';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.fontSize = (Math.random() * 10 + 10) + 'px';
                container.appendChild(star);
            }
        }

        // 纪念日倒计时
        function updateCountdown() {
            const now = new Date();
            const diff = now - CONFIG.startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // 渲染时间线
        function renderTimeline() {
            const container = document.getElementById('timeline');
            CONFIG.memories.forEach((memory, index) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.style.transitionDelay = (index * 0.15) + 's';

                let photoHtml = '';
                if (memory.photo) {
                    photoHtml = `<div class="timeline-photo"><img src="${memory.photo}" alt="${memory.title}" onclick="viewPhoto('${memory.photo}')"></div>`;
                } else {
                    photoHtml = `<div class="timeline-photo" style="font-size:50px;">${memory.emoji}</div>`;
                }

                item.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="timeline-date">${memory.date} · ${memory.emoji} ${memory.title}</div>
                    <div class="timeline-content">${memory.text}</div>
                    ${photoHtml}
                `;
                container.appendChild(item);
            });
        }

        // 渲染照片墙
        function renderPhotoWall() {
            const container = document.getElementById('photoWall');
            CONFIG.photos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'photo-item';

                // 如果有真实照片URL，使用img标签
                // 否则显示emoji占位符
                if (photo.url) {
                    item.innerHTML = `
                        <img src="${photo.url}" alt="${photo.caption}" onclick="viewPhoto('${photo.url}')">
                        <div class="photo-caption">${photo.caption}</div>
                    `;
                } else {
                    item.innerHTML = `
                        <div class="photo-placeholder">${photo.emoji}</div>
                        <div class="photo-caption">${photo.caption}</div>
                    `;
                }
                container.appendChild(item);
            });
        }

        // 打字机情书
        function typeLetter() {
            const container = document.getElementById('letterContent');
            const text = CONFIG.loveLetter;
            let i = 0;

            function type() {
                if (i < text.length) {
                    container.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 30);
                }
            }

            // 等卡片进入视口后再开始打字
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && i === 0) {
                        setTimeout(type, 500);
                        observer.disconnect();
                    }
                });
            }, { threshold: 0.5 });

            observer.observe(document.getElementById('letterCard'));
        }

        // 滚动动画
        function setupScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.section-card').forEach(card => {
                observer.observe(card);
            });

            // 时间线项单独观察
            const timelineObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            document.querySelectorAll('.timeline-item').forEach(item => {
                timelineObserver.observe(item);
            });

            // 底部
            const footerObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.5 });

            footerObserver.observe(document.getElementById('footer'));
        }

        // 点击产生爱心
        function setupClickHearts() {
            document.addEventListener('click', function(e) {
                if (e.target.closest('.modal-content') || 
                    e.target.closest('.photo-viewer') ||
                    e.target.closest('.romantic-btn')) return;

                createFloatingHeart(e.clientX, e.clientY);
            });
        }

        function createFloatingHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💖', '💕', '💗'][Math.floor(Math.random() * 4)];
            heart.style.left = (x - 12) + 'px';
            heart.style.top = (y - 12) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        // 烟花效果
        function createFirework(x, y) {
            const container = document.getElementById('fireworks');
            const colors = ['#ff6b9d', '#ff8fab', '#a18cd1', '#fbc2eb', '#ffd93d', '#ff9a9e', '#fff', '#ff4757'];

            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = (Math.PI * 2 * i) / 40;
                const distance = Math.random() * 120 + 60;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');

                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 弹窗功能
        function showModal(emoji, title, text) {
            document.getElementById('modalEmoji').textContent = emoji;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalOverlay').classList.add('active');

            // 烟花
            setTimeout(() => {
                createFirework(window.innerWidth / 2, window.innerHeight / 2);
            }, 300);
        }

        function closeModal(e) {
            if (!e || e.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        function showLoveModal() {
            showModal(CONFIG.popups.love.emoji, CONFIG.popups.love.title, CONFIG.popups.love.text);
        }

        function showHugModal() {
            showModal(CONFIG.popups.hug.emoji, CONFIG.popups.hug.title, CONFIG.popups.hug.text);
            // 额外爱心雨
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createFloatingHeart(
                        Math.random() * window.innerWidth,
                        window.innerHeight - 50
                    );
                }, i * 80);
            }
        }

        function showPromiseModal() {
            showModal(CONFIG.popups.promise.emoji, CONFIG.popups.promise.title, CONFIG.popups.promise.text);
        }

        // 照片查看器
        function viewPhoto(url) {
            document.getElementById('viewerImg').src = url;
            document.getElementById('photoViewer').classList.add('active');
        }

        function closePhotoViewer() {
            document.getElementById('photoViewer').classList.remove('active');
        }

        // 音乐播放
        const bgMusic = new Audio('love-song.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.5; // 音量设置为50%
        let isPlaying = false;

        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            isPlaying = !isPlaying;
            if (isPlaying) {
                btn.classList.add('playing');
                btn.innerHTML = '🎶';
                bgMusic.play().catch(err => {
                    console.log('音乐播放失败:', err);
                    isPlaying = false;
                    btn.classList.remove('playing');
                    btn.innerHTML = '🎵';
                });
            } else {
                btn.classList.remove('playing');
                btn.innerHTML = '🎵';
                bgMusic.pause();
            }
        }

        // 用户首次点击页面时播放音乐
        window.addEventListener('DOMContentLoaded', function() {
            document.body.addEventListener('click', function autoPlay() {
                if (!isPlaying) {
                    toggleMusic();
                }
                document.body.removeEventListener('click', autoPlay);
            }, { once: true });
        });

        // 启动
        window.addEventListener('DOMContentLoaded', init);
    </script>
